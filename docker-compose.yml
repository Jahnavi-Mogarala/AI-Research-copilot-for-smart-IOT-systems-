version: '3.8'

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:15-alpine
    container_name: vinravs-postgres
    restart: always
    environment:
      POSTGRES_USER: vinravs_admin
      POSTGRES_PASSWORD: vinravs_secure_pass_2502
      POSTGRES_DB: vinravs_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinravs_admin -d vinravs_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: vinravs-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vinravs-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://vinravs_admin:vinravs_secure_pass_2502@postgres:5432/vinravs_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=vinravs-ultra-secret-key-2502
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Next.js Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vinravs-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  pgdata:
